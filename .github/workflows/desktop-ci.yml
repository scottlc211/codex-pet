name: Desktop CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
      - "V*"
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level high

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432 # Node 24 runtime
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
          ignore: RUSTSEC-2024-0429

  build:
    name: Build ${{ matrix.label }}
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86_64
            os: windows-latest
            platform: windows-x86_64
            bundles: nsis,msi
          - label: Linux x86_64
            os: ubuntu-22.04
            platform: linux-x86_64
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            file \
            libappindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            xdg-utils

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release versions
        run: pnpm check:versions

      - name: Test frontend logic
        run: pnpm test

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Lint Rust backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: Build native installers
        run: pnpm tauri build --ci --bundles "${{ matrix.bundles }}" -- --locked

      - name: Collect release artifacts
        run: node scripts/collect-release-artifacts.mjs "${{ matrix.platform }}" "artifacts/${{ matrix.platform }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-pet-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-pet-*
          path: release-assets
          merge-multiple: true

      - name: Verify packaged artifacts
        working-directory: release-assets
        run: |
          sha256sum --check SHA256SUMS-linux-x86_64.txt
          sha256sum --check SHA256SUMS-windows-x86_64.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node --print "require('./package.json').version")
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --generate-notes \
              --title "Codex Pet $VERSION" \
              --verify-tag
          fi
